<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:o="urn:schemas-microsoft-com:office:office">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="x-apple-disable-message-reformatting" />
    <style>
      table,
      td,
      div,
      h1,
      p,
      h3,
      h2,
      h5 {
        font-family: 'Roboto';
      }
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }
      p {
        padding-bottom: 7px;
        font-size: 16px;
      }
      h5 {
        padding-bottom: 10px;
        font: bold 14px/16px Arial;
      }
    </style>
  </head>
  <body style="margin: 0; padding: 0">
    <table style="width: 100%">
      <tr>
        <td align="center">
            <table  style="width: 602px; border-collapse: collapse; box-shadow: 0px 3px 6px #00000029">
                <tr>
                    <td style="padding: 12px;">
                        <table>
                            <tr>
                                <td align="center" style="padding-bottom: 12px;border-bottom: 1px solid #B4B4B4;">
                                    <img src="https://logos-unes.s3.us-west-1.amazonaws.com/logo_1.png" alt="logo">
                                </td>
                            </tr>
                            <tr>
                                <td>
                                    <p style="margin-bottom: 16px;margin-top: 16px;text-align: center;">Hola, confirma tu cuenta para continuar.</p>
                                    <p style="font-size: 18px;margin-bottom: 16px;text-align: center;color: #000;">
                                        Te damos la bienvenida al CRM de <strong style="color: #3F6C51;">Unidos con Esperanza</strong>, una vez confirmada se te redirigirá al inicio de sesión para que puedas comenzar.
                                    </p>
                                </td>
                            </tr>
                            <tr align="center">
                                <td style="padding: 32px 0;">
                                    <a style="display: inline-block;border-radius: 4px;background: #3F6C51;text-align: center;text-decoration: none;color: inherit;padding: 18px 32px;font-size: 18px;font-weight: 600;" href="{{url}}"><p style="margin: 0;padding: 0;color: #fff;">Confirmar mi cuenta</p></a>
                                </td>
                            </tr>
                            <tr>
                                <td style="font-size: 14px;border-top: 1px solid #B4B4B4;padding-top: 16px;" align="center">
                                    <p>
                                        Para soporte o dudas adicionales
                                    </p>
                                    <p style="color:#28B2FF">
                                        soporte@unidosconesperanza.org
                                    </p>
                                </td>
                            </tr>
                        </table>
                    </td>
                </tr>
            </table>
        </td>
      </tr>
    </table>
  </body>
</html>
